  <text x="100" y="76" font-family="Georgia,serif" font-size="9.5" text-anchor="middle" fill="#0B3D2E">Priya &amp; Arjun</text>
  <line x1="78" y1="83" x2="122" y2="83" stroke="#D4A017" stroke-width="1.2"/>
  <rect x="82" y="89" width="36" height="4" rx="2" fill="#8B5E3C" opacity="0.5"/>
  <rect x="87" y="97" width="26" height="3" rx="1.5" fill="#8B5E3C" opacity="0.3"/>
