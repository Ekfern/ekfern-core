<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="100" fill="#EAF4F4"/>
  <!-- Calendar card -->
  <rect x="38" y="44" width="124" height="118" rx="12" fill="white" stroke="#E8D8C3" stroke-width="1.5"/>
  <!-- Calendar header -->
  <rect x="38" y="44" width="124" height="32" rx="12" fill="#0B3D2E"/>
  <rect x="38" y="62" width="124" height="14" fill="#0B3D2E"/>
  <text x="100" y="65" font-family="Georgia,serif" font-size="10" text-anchor="middle" fill="#E8D8C3">November 2025</text>
  <!-- Day headers -->
  <text x="52" y="93" font-family="Arial" font-size="7" text-anchor="middle" fill="#8B5E3C" opacity="0.6">M</text>
  <text x="70" y="93" font-family="Arial" font-size="7" text-anchor="middle" fill="#8B5E3C" opacity="0.6">T</text>
  <text x="88" y="93" font-family="Arial" font-size="7" text-anchor="middle" fill="#8B5E3C" opacity="0.6">W</text>
  <text x="106" y="93" font-family="Arial" font-size="7" text-anchor="middle" fill="#8B5E3C" opacity="0.6">T</text>
  <text x="124" y="93" font-family="Arial" font-size="7" text-anchor="middle" fill="#8B5E3C" opacity="0.6">F</text>
  <text x="142" y="93" font-family="Arial" font-size="7" text-anchor="middle" fill="#8B5E3C" opacity="0.6">S</text>
  <!-- Calendar days row 1 -->
  <text x="52" y="110" font-family="Arial" font-size="8" text-anchor="middle" fill="#0B3D2E">3</text>
  <text x="70" y="110" font-family="Arial" font-size="8" text-anchor="middle" fill="#0B3D2E">4</text>
  <text x="88" y="110" font-family="Arial" font-size="8" text-anchor="middle" fill="#0B3D2E">5</text>
  <!-- Slot filled -->
  <rect x="99" y="101" width="14" height="14" rx="7" fill="#218085"/>
  <text x="106" y="110" font-family="Arial" font-size="8" text-anchor="middle" fill="white">6</text>
  <text x="124" y="110" font-family="Arial" font-size="8" text-anchor="middle" fill="#0B3D2E">7</text>
  <text x="142" y="110" font-family="Arial" font-size="8" text-anchor="middle" fill="#0B3D2E">8</text>
  <!-- Row 2 -->
  <text x="52" y="128" font-family="Arial" font-size="8" text-anchor="middle" fill="#0B3D2E">10</text>
  <text x="70" y="128" font-family="Arial" font-size="8" text-anchor="middle" fill="#0B3D2E">11</text>
  <!-- Slot filled gold -->
  <rect x="81" y="119" width="14" height="14" rx="7" fill="#D4A017"/>
  <text x="88" y="128" font-family="Arial" font-size="8" text-anchor="middle" fill="white">12</text>
  <text x="106" y="128" font-family="Arial" font-size="8" text-anchor="middle" fill="#0B3D2E">13</text>
  <text x="124" y="128" font-family="Arial" font-size="8" text-anchor="middle" fill="#0B3D2E">14</text>
  <!-- Slot filled dark -->
  <rect x="135" y="119" width="14" height="14" rx="7" fill="#0B3D2E"/>
  <text x="142" y="128" font-family="Arial" font-size="8" text-anchor="middle" fill="white">15</text>
  <!-- Capacity bar -->
  <rect x="48" y="144" width="104" height="8" rx="4" fill="#E8D8C3"/>
  <rect x="48" y="144" width="72" height="8" rx="4" fill="#218085"/>
  <text x="48" y="162" font-family="Arial" font-size="7" fill="#8B5E3C">Capacity</text>
  <text x="152" y="162" font-family="Arial" font-size="7" text-anchor="end" fill="#218085" font-weight="bold">72 / 100</text>
</svg>
