<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="100" fill="#EAF4F4"/>
  <!-- Phone body -->
  <rect x="62" y="32" width="76" height="130" rx="14" fill="#0B3D2E"/>
  <rect x="85" y="38" width="30" height="6" rx="3" fill="#072b1f"/>
