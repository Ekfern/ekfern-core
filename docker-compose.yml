version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: registry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/registry
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=True
      - CORS_ALLOW_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - FRONTEND_ORIGIN=http://localhost:3000
      - EMAIL_PROVIDER=ses
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET:-}
      # Page Layout Auto-Generator (LLM). OFF by default; flip the kill-switch
      # to True only when ready and an ANTHROPIC_API_KEY is configured.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_GENERATION_ENABLED=${LLM_GENERATION_ENABLED:-False}
      - LLM_VISION_MODEL=${LLM_VISION_MODEL:-claude-sonnet-4-5}
      - LLM_TEXT_MODEL=${LLM_TEXT_MODEL:-claude-sonnet-4-5}
      - LLM_DAILY_COST_CAP_USD=${LLM_DAILY_COST_CAP_USD:-5}
      - LLM_MONTHLY_COST_CAP_USD=${LLM_MONTHLY_COST_CAP_USD:-50}
      - LLM_COST_ALERT_EMAIL=${LLM_COST_ALERT_EMAIL:-}
      # SSRF allowlist for backend-side image fetches. Prod default is
      # S3+CloudFront only; local dev needs `localhost` because greeting
      # card uploads return /media/... URLs that the backend fetches from
      # itself when feeding the vision LLM as base64.
      - LLM_IMAGE_FETCH_ALLOWED_HOSTS=${LLM_IMAGE_FETCH_ALLOWED_HOSTS:-*.amazonaws.com,*.cloudfront.net}
      - LLM_IMAGE_FETCH_ALLOW_PRIVATE=${LLM_IMAGE_FETCH_ALLOW_PRIVATE:-False}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Apply schema changes on boot so local dev doesn’t 500 after git pull (e.g. new columns).
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/registry
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=True
      - AUTO_SCHEDULE_ANALYTICS_BATCH=True
      - ANALYTICS_BATCH_INTERVAL_MINUTES=2
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    command: python manage.py process_tasks

  digest-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/registry
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=True
      - FRONTEND_ORIGIN=http://localhost:3000
      # Override to a short interval for local testing, e.g. DIGEST_INTERVAL_SECONDS=300 (5 min)
      - DIGEST_INTERVAL_SECONDS=${DIGEST_INTERVAL_SECONDS:-86400}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    command: sh -c "while true; do python manage.py send_digests; sleep $${DIGEST_INTERVAL_SECONDS:-86400}; done"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://host.docker.internal:8000
      - NEXT_PUBLIC_RAZORPAY_KEY_ID=${NEXT_PUBLIC_RAZORPAY_KEY_ID:-}
      - NEXT_PUBLIC_BRAND_NAME=${NEXT_PUBLIC_BRAND_NAME:-Ekfern}
      - NEXT_PUBLIC_COMPANY_HOMEPAGE=${NEXT_PUBLIC_COMPANY_HOMEPAGE:-${NEXT_PUBLIC_API_BASE:-https://eventregistry.com}}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

